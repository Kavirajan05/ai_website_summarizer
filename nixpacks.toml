[phases.setup]
nixPkgs = ["python311", "glib", "nss", "fontconfig", "freetype"]

[phases.build]
cmds = [
    "pip install -r requirements.txt",
    "PLAYWRIGHT_BROWSERS_PATH=/app/pw-browsers playwright install --with-deps chromium"
]

[start]
cmd = "PLAYWRIGHT_BROWSERS_PATH=/app/pw-browsers uvicorn app.main:app --host 0.0.0.0 --port $PORT"
